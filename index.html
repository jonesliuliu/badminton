<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>羽球球隊系統 v2</title>
<style>
  :root{
    --bg:#0f172a; --panel:#1e293b; --panel2:#273549; --line:#334155;
    --txt:#f1f5f9; --sub:#94a3b8; --green:#22c55e; --red:#ef4444;
    --blue:#3b82f6; --amber:#f59e0b; --teal:#14b8a6;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  body{margin:0; font-family:-apple-system,"PingFang TC","Noto Sans TC",sans-serif; background:var(--bg); color:var(--txt); min-height:100vh;}
  button{font-family:inherit; border:none; border-radius:12px; cursor:pointer; color:#fff; font-size:16px;}
  input,select,textarea{font-family:inherit; background:var(--panel2); border:1px solid var(--line); border-radius:10px; color:var(--txt); font-size:16px; padding:10px;}
  header{display:flex; align-items:center; gap:10px; padding:10px 16px; background:var(--panel); border-bottom:1px solid var(--line); flex-wrap:wrap; position:sticky; top:0; z-index:5;}
  header h1{font-size:19px; margin:0;}
  .spacer{flex:1;}
  .hbtn{padding:10px 16px; background:var(--panel2);}
  .hbtn.on{background:var(--blue);}
  main{padding:14px; max-width:1000px; margin:0 auto;}
  /* 球場看板 */
  #courtsWrap{display:grid; grid-template-columns:repeat(auto-fit,minmax(320px,1fr)); gap:12px;}
  .courtboard{background:var(--panel2); border:1px solid var(--line); border-radius:14px; padding:12px;}
  .cb-head{display:flex; align-items:center; gap:8px; flex-wrap:wrap; margin-bottom:4px;}
  .cb-teams{display:flex; gap:8px; align-items:stretch; margin:8px 0;}
  .cb-vs{align-self:center; font-weight:900; font-size:20px; color:var(--sub);}
  .cb-team{flex:1 1 0; min-width:0; border-radius:12px; padding:10px; display:flex; flex-direction:column; gap:8px;
    background:var(--panel); border:1px solid var(--line);}
  .cb-team{container-type:inline-size;}
  .cb-team .pchip{background:var(--panel2); width:100%; min-width:0; justify-content:space-between; align-items:center; padding:8px 10px;}
  .cbp-txt{display:flex; flex-direction:column; line-height:1.2; text-align:left; min-width:0; flex:1;}
  .cbp-name{font-size:clamp(15px,17cqw,30px); font-weight:800; color:var(--txt);
    white-space:nowrap; overflow:hidden; text-overflow:ellipsis; max-width:100%;}
  .cbp-elo{font-size:12px; color:var(--sub); font-weight:400;}
  .cbx{background:var(--panel); border:1px solid var(--line); color:var(--sub); border-radius:10px;
    min-width:34px; height:34px; font-size:15px; margin-left:10px; padding:0;}
  .cbx.sm{min-width:26px; height:26px; font-size:12px; border-radius:8px; margin-left:6px;}
  .cb-team .emptycell{width:100%; justify-content:center; padding:14px; font-size:16px;}
  /* 底部功能列（手機） */
  #botbar{display:none; position:fixed; bottom:0; left:0; right:0; background:var(--panel);
    border-top:1px solid var(--line); z-index:45;}
  #botbar button{flex:1; background:transparent; color:var(--sub);
    padding:8px 2px calc(10px + env(safe-area-inset-bottom)); font-size:11px; border-radius:0;
    display:flex; flex-direction:column; gap:2px; align-items:center;}
  #botbar button .ic{font-size:20px; display:flex;}
  .lni{width:18px; height:18px; vertical-align:-3px;}
  #botbar .ic .lni{width:22px; height:22px;}
  #botbar button.on{color:#fff; background:var(--blue);}
  #botbar button.hide{display:none;}
  #navBack.hide{display:none !important;}
  @media (max-width:700px){
    header .hbtn{display:none;}
    #evBind .hbtn{display:block;}
    #navBack{display:block;}
    #botbar.ready{display:flex;}
    main{padding-bottom:96px;}
  }
  @media (max-height:500px){
    header .hbtn{display:none;}
    #evBind .hbtn{display:block;}
    #navBack{display:block;}
    #botbar.ready{display:flex; flex-direction:column; top:0; bottom:0; left:0; right:auto; width:72px;
      border-top:none; border-right:1px solid var(--line); justify-content:flex-start; padding-top:6px;}
    #botbar button{flex:0 0 auto; padding:10px 2px;}
    main{padding-left:86px; padding-bottom:14px;}
    header{padding-left:86px;}
    .cb-team .pchip{padding:6px 8px;}
    .cbx{min-width:28px; height:28px; font-size:13px;}
  }
  .card{background:var(--panel); border:1px solid var(--line); border-radius:16px; padding:14px; margin-bottom:14px;}
  .card h2{margin:0 0 10px; font-size:17px;}
  .sub{color:var(--sub); font-size:13px;}
  .row{display:flex; gap:8px; flex-wrap:wrap; align-items:center; margin:8px 0;}
  .ok{background:var(--green); font-weight:700; padding:12px 18px;}
  .pri{background:var(--blue); padding:12px 18px;}
  .danger{background:var(--red); padding:10px 14px;}
  .cancel{background:var(--panel2); color:var(--sub); padding:12px 18px;}
  .mini{padding:7px 12px; font-size:13px; background:var(--panel2); color:var(--sub); border-radius:10px;}
  .mini.act{background:var(--teal); color:#fff;}
  .mini.red{background:var(--red); color:#fff;}
  .tag{font-size:12px; padding:2px 10px; border-radius:10px; white-space:nowrap;}
  .t-main{background:#14532d; color:#86efac;}
  .t-wait{background:#78350f; color:#fcd34d;}
  .t-promo{background:var(--amber); color:#111; font-weight:700;}
  .t-ok{background:#1e3a8a; color:#93c5fd;}
  .t-mgr{background:#4c1d95; color:#ddd6fe;}
  .item{display:flex; align-items:center; gap:8px; padding:8px 0; border-bottom:1px solid var(--line); font-size:16px; flex-wrap:wrap;}
  .item:last-child{border-bottom:none;}
  .item .num{color:var(--sub); width:24px;}
  .item .nm{flex:1; min-width:80px;}
  .evhead{display:flex; align-items:center; gap:10px; flex-wrap:wrap;}
  .evdate{font-size:20px; font-weight:800;}
  .evtime{color:var(--teal); font-size:16px; font-weight:600;}
  .evvenue{color:var(--amber); font-size:15px;}
  .cnt{color:var(--sub); font-size:14px;}
  .divider{border-top:1px solid var(--line); margin:10px 0; padding-top:8px; color:var(--sub); font-size:14px;}
  .center{max-width:420px; margin:40px auto; padding:0 16px;}
  .center .card{padding:22px;}
  .center h1{text-align:center; font-size:24px;}
  .field{margin:10px 0;}
  .field label{display:block; color:var(--sub); font-size:14px; margin-bottom:4px;}
  .field input,.field select{width:100%;}
  .full{width:100%; padding:14px; font-size:18px;}
  .notice{background:#78350f; border-radius:10px; padding:10px 12px; margin:10px 0; color:#fde68a; font-size:14px;}
  .errbar{background:var(--red); color:#fff; text-align:center; padding:10px; font-size:15px; display:none;}
  .errbar.show{display:block;}
  .tabs{display:flex; background:var(--panel2); border-radius:12px; overflow:hidden; margin-bottom:14px;}
  .tabs button{flex:1; background:transparent; padding:12px 4px; font-size:15px; color:var(--sub); border-radius:0;
    display:flex; align-items:center; justify-content:center; gap:5px;}
  .tabs button.on{background:var(--blue); color:#fff; font-weight:700;}
  .hide{display:none;}
  .overlay{position:fixed; inset:0; background:rgba(0,0,0,.6); display:none; align-items:center; justify-content:center; z-index:50; padding:16px;}
  .overlay.show{display:flex;}
  .dlgbox{background:var(--panel); border:1px solid var(--line); border-radius:18px; padding:22px; width:min(420px,100%);}
  .dlgbox .msg{font-size:17px; line-height:1.6; white-space:pre-line; margin-bottom:14px;}
  .dlgbox input{width:100%;}
  .dlgbtns{display:flex; gap:10px; margin-top:14px;}
  .dlgbtns button{flex:1; padding:13px; font-size:17px;}
  .pchip{display:inline-flex; gap:6px; align-items:center; background:var(--panel2); padding:8px 12px;
    border-radius:14px; font-size:16px; cursor:pointer; user-select:none; -webkit-user-select:none;}
  .pchip small{color:var(--sub); font-size:12px;}
  .pchip.selchip{outline:2px solid var(--teal); background:#134e4a;}
  .emptycell{display:inline-flex; border:1.5px dashed var(--line); color:var(--sub); padding:8px 14px;
    border-radius:14px; cursor:pointer; font-size:14px; user-select:none;}
  .pchip{touch-action:pan-y; -webkit-touch-callout:none;}
  .dragghost{position:fixed; z-index:99; background:var(--teal); color:#fff; padding:10px 18px;
    border-radius:20px; font-size:17px; font-weight:700; pointer-events:none; box-shadow:0 4px 16px rgba(0,0,0,.5);}
  body.dragging{user-select:none; -webkit-user-select:none;}
  .dropover{outline:2px solid var(--teal); background:#134e4a !important; border-radius:14px;}
  #toast{position:fixed; bottom:24px; left:50%; transform:translateX(-50%); background:#000; color:#fff;
    padding:12px 22px; border-radius:24px; font-size:15px; opacity:0; transition:opacity .3s; z-index:99; pointer-events:none; max-width:90vw;}
  #toast.show{opacity:.94;}
</style>
</head>
<body>

<div class="errbar" id="errbar">⚠ 無法連線資料庫——若在公司網路，請切換到手機網路再試</div>

<header id="topbar" class="hide">
  <h1>🏸 <span id="teamName"></span></h1>
  <span class="sub" id="whoami"></span>
  <div class="spacer"></div>
  <button class="hbtn hide" id="navBack" onclick="backToAdmin()"><svg class="lni" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 5l-7 7 7 7"/></svg> 總覽</button>
  <div id="evBind" class="hide" style="position:relative;">
    <button class="hbtn" onclick="toggleBindMenu(event)" style="text-align:left;line-height:1.3;padding:6px 14px;">
      <span id="ebLine1" style="font-size:15px;"></span> ▾<br>
      <span id="ebLine2" class="sub" style="font-size:11px;"></span>
    </button>
    <div id="evBindMenu" class="hide" style="position:absolute;top:110%;left:0;background:var(--panel);
      border:1px solid var(--line);border-radius:12px;min-width:250px;z-index:60;
      box-shadow:0 8px 24px rgba(0,0,0,.5);max-height:60vh;overflow:auto;"></div>
  </div>
  <button class="hbtn" id="navLive" onclick="showView('live')"><svg class="lni" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="5" width="18" height="14" rx="2"/><line x1="12" y1="5" x2="12" y2="19"/><line x1="3" y1="12" x2="21" y2="12"/></svg> 現場</button>
  <button class="hbtn hide" id="navCheckin" onclick="showView('checkin')"><svg class="lni" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M8 12.5l2.5 2.5L16 9.5"/></svg> 簽到</button>
  <span id="navDiv" class="hide" style="width:2px;align-self:stretch;margin:6px 4px;background:#475569;border-radius:1px;"></span>
  <button class="hbtn on" id="navSignup" onclick="showView('signup')"><svg class="lni" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="17" rx="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="16" y1="2" x2="16" y2="6"/></svg> 報名</button>
  <button class="hbtn" id="navRank" onclick="showView('rank')"><svg class="lni" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="6" y1="20" x2="6" y2="13"/><line x1="12" y1="20" x2="12" y2="5"/><line x1="18" y1="20" x2="18" y2="10"/></svg> 排行</button>
  <button class="hbtn hide" id="navManage" onclick="showView('manage')"><svg class="lni" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="4" y1="7" x2="20" y2="7"/><circle cx="9" cy="7" r="2.4"/><line x1="4" y1="17" x2="20" y2="17"/><circle cx="15" cy="17" r="2.4"/></svg> 管理</button>
  <button class="hbtn" id="btnPw" onclick="changeMyPw()"><svg class="lni" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="8" cy="16" r="4"/><path d="M11 13L20 4"/><path d="M16.5 7.5l3 3"/></svg> 改密碼</button>
  <button class="hbtn" onclick="logout()">登出</button>
</header>

<!-- 登入 -->
<div class="center" id="loginView">
  <h1>🏸 羽球球隊系統</h1>
  <div class="card">
    <div class="field"><label>球隊</label><select id="loginTeam"></select></div>
    <div class="field"><label>你的名字</label><input id="loginName" placeholder="輸入姓名（需與登記相同）" autocomplete="off"></div>
    <div class="field"><label>密碼</label><input type="password" id="loginPw" placeholder="輸入密碼"></div>
    <button class="ok full" onclick="doLogin()">登入</button>
    <div class="sub" style="text-align:center;margin-top:12px;">忘記密碼？請洽你的球隊管理者重設</div>
  </div>
  <div class="sub" style="text-align:center;" id="verTag"></div>
</div>

<main id="appView" class="hide">
  <div id="signupView"></div>
  <div id="checkinView" class="hide"></div>
  <div id="liveView" class="hide"></div>
  <div id="rankView" class="hide"></div>
  <div id="manageView" class="hide"></div>
  <div id="adminView" class="hide"></div>
</main>

<nav id="botbar">
  <button id="bNavLive" onclick="showView('live')"><span class="ic"><svg class="lni" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="5" width="18" height="14" rx="2"/><line x1="12" y1="5" x2="12" y2="19"/><line x1="3" y1="12" x2="21" y2="12"/></svg></span>現場</button>
  <button id="bNavCheckin" onclick="showView('checkin')"><span class="ic"><svg class="lni" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M8 12.5l2.5 2.5L16 9.5"/></svg></span>簽到</button>
  <button id="bNavSignup" onclick="showView('signup')"><span class="ic"><svg class="lni" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="17" rx="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="16" y1="2" x2="16" y2="6"/></svg></span>報名</button>
  <button id="bNavRank" onclick="showView('rank')"><span class="ic"><svg class="lni" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="6" y1="20" x2="6" y2="13"/><line x1="12" y1="20" x2="12" y2="5"/><line x1="18" y1="20" x2="18" y2="10"/></svg></span>排行</button>
  <button id="bNavManage" class="hide" onclick="showView('manage')"><span class="ic"><svg class="lni" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="4" y1="7" x2="20" y2="7"/><circle cx="9" cy="7" r="2.4"/><line x1="4" y1="17" x2="20" y2="17"/><circle cx="15" cy="17" r="2.4"/></svg></span>管理</button>
  <button onclick="openMore()"><span class="ic"><svg class="lni" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="5" cy="12" r="1"/><circle cx="12" cy="12" r="1"/><circle cx="19" cy="12" r="1"/></svg></span>更多</button>
</nav>

<div class="overlay" id="moreDlg">
  <div class="dlgbox" style="max-width:340px;">
    <div class="dlgbtns" style="flex-direction:column;margin-top:0;">
      <button class="cancel" onclick="closeMore();changeMyPw()"><svg class="lni" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="8" cy="16" r="4"/><path d="M11 13L20 4"/><path d="M16.5 7.5l3 3"/></svg> 改密碼</button>
      <button class="danger" onclick="logout()">登出</button>
      <button class="cancel" onclick="closeMore()">關閉</button>
    </div>
  </div>
</div>

<div class="overlay" id="evsetDlg">
  <div class="dlgbox">
    <div class="msg" id="evsetTitle" style="font-weight:700;"></div>
    <div class="row"><span class="sub" style="width:70px;">場地數</span><span id="evsetCourts"></span></div>
    <div class="row"><span class="sub" style="width:70px;">等待格</span><span id="evsetSlots"></span></div>
    <div class="dlgbtns">
      <button class="cancel" onclick="closeEvSet()">取消</button>
      <button class="ok" onclick="saveEvSet()">儲存</button>
    </div>
  </div>
</div>
<div class="overlay" id="scoreDlg">
  <div class="dlgbox" style="width:min(520px,100%);">
    <div class="msg" id="sdTitle" style="text-align:center;font-weight:700;"></div>
    <div style="display:flex;gap:12px;align-items:center;justify-content:center;">
      <div style="flex:1;text-align:center;">
        <div class="sub" id="sdNameA" style="min-height:36px;"></div>
        <div id="sdA" style="font-size:48px;font-weight:800;">21</div>
        <div style="display:flex;gap:8px;justify-content:center;">
          <button class="cancel" style="width:56px;" onclick="sdBump('a',-1)">−</button>
          <button class="cancel" style="width:56px;" onclick="sdBump('a',1)">＋</button>
        </div>
      </div>
      <div class="sub" style="font-weight:800;">：</div>
      <div style="flex:1;text-align:center;">
        <div class="sub" id="sdNameB" style="min-height:36px;"></div>
        <div id="sdB" style="font-size:48px;font-weight:800;">15</div>
        <div style="display:flex;gap:8px;justify-content:center;">
          <button class="cancel" style="width:56px;" onclick="sdBump('b',-1)">−</button>
          <button class="cancel" style="width:56px;" onclick="sdBump('b',1)">＋</button>
        </div>
      </div>
    </div>
    <div class="dlgbtns">
      <button class="cancel" id="sdCancel">取消</button>
      <button class="ok" id="sdOk">確認</button>
    </div>
  </div>
</div>
<div class="overlay" id="dlg">
  <div class="dlgbox">
    <div class="msg" id="dlgMsg"></div>
    <input id="dlgInput" class="hide" autocomplete="off">
    <div class="dlgbtns">
      <button class="cancel" id="dlgCancel">取消</button>
      <button class="danger" id="dlgOk">確定</button>
    </div>
  </div>
</div>
<div id="toast"></div>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getAuth, signInAnonymously, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';
import { getFirestore, collection, doc, addDoc, setDoc, getDoc, getDocs, deleteDoc, updateDoc,
         onSnapshot, query, orderBy, where, serverTimestamp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

const firebaseConfig = {
  apiKey: "AIzaSyBcc4P8YePX2xS5sMTlNpf3TYQkTwTroNo",
  authDomain: "badminton-f9063.firebaseapp.com",
  projectId: "badminton-f9063",
  storageBucket: "badminton-f9063.firebasestorage.app",
  messagingSenderId: "223475807993",
  appId: "1:223475807993:web:e62e327f9a8ae43e479428"
};
const APP_VER='v2.6.4-beta（2026-07-23）';
document.getElementById('verTag').textContent='版本 '+APP_VER;
const fbApp = initializeApp(firebaseConfig);
const db = getFirestore(fbApp);
const auth = getAuth(fbApp);

/* ---------- 共用 ---------- */
const $ = id => document.getElementById(id);
const esc = s => String(s??'').replace(/[&<>"]/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
function hash(s){ let h=5381; for(const c of s){ h=((h<<5)+h+c.charCodeAt(0))>>>0; } return h.toString(16); }
function toast(msg){ const t=$('toast'); t.textContent=msg; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),2600); }
// App 內建對話框（取代瀏覽器原生 confirm / prompt，各裝置行為一致）
function askConfirm(msg, danger=true){
  return new Promise(res=>{
    $('dlgMsg').textContent=msg;
    $('dlgInput').classList.add('hide');
    $('dlgOk').className=danger?'danger':'ok';
    $('dlg').classList.add('show');
    $('dlgOk').onclick=()=>{ $('dlg').classList.remove('show'); res(true); };
    $('dlgCancel').onclick=()=>{ $('dlg').classList.remove('show'); res(false); };
  });
}
function askInput(msg, type='password'){
  return new Promise(res=>{
    $('dlgMsg').textContent=msg;
    const inp=$('dlgInput');
    inp.classList.remove('hide'); inp.type=type; inp.value='';
    $('dlgOk').className='ok';
    $('dlg').classList.add('show');
    setTimeout(()=>inp.focus(),50);
    $('dlgOk').onclick=()=>{ $('dlg').classList.remove('show'); res(inp.value); };

function fmtDate(s){
  const [y,m,d]=s.split('-').map(Number);

async function safeWrite(fn, okMsg){
  try{
    await Promise.race([ fn(),
      new Promise((_,rej)=>setTimeout(()=>rej(new Error('連線逾時，請確認網路（公司網路可能封鎖 Firebase）')),10000)) ]);
    if(okMsg) toast(okMsg);
    return true;
  }catch(e){ console.error(e); toast('❌ 儲存失敗：'+e.message); return false; }
}

let watchDay=null;
function watchEvents(){
  watchDay=todayStr();
  if(unsubEvents) unsubEvents();
  const q=query(eventsCol(), where('dateStr','>=',todayStr()), orderBy('dateStr'));
  unsubEvents=onSnapshot(q, snap=>{
    const ids=new Set();
    snap.docs.forEach(d=>{ ids.add(d.id); eventCache[d.id]={id:d.id, ...d.data()}; });
    Object.keys(signupUnsubs).forEach(id=>{
      if(!ids.has(id)){ signupUnsubs[id](); delete signupUnsubs[id]; delete signupCache[id]; delete eventCache[id]; }
    });
    snap.docs.forEach(d=>{
      if(signupUnsubs[d.id]) return;
      signupUnsubs[d.id]=onSnapshot(query(signupsCol(d.id), orderBy('at')), s=>{
        signupCache[d.id]=s.docs.map(x=>({id:x.id, ...x.data()}));
        renderSignup();
        if(!$('manageView').classList.contains('hide')) renderManage();
      });
    });
    if(typeof watchLive==='function'){
      if(boundEventId && !eventCache[boundEventId]){ boundEventId=null; if(unsubLive){unsubLive();unsubLive=null;} liveState=null; }
      if(!boundEventId) watchLive();
      updateBindSel();
    }
    renderSignup();
    if(!$('manageView').classList.contains('hide')) renderManage();
  }, e=>{ console.error(e); toast('❌ 讀取打球日失敗：'+e.message); });
}

    const myIdx=list.findIndex(s=>s.memberId===session.me.id);
    const isMgr=session.me.role==='manager';
    const row=(s,i,isWait)=>{
      const promoted=!isWait && s.initialStatus==='wait';
      const canCancel=isMgr || s.memberId===session.me.id || s.byId===session.me.id;
      const canConfirm=promoted && !s.confirmed && (isMgr || s.memberId===session.me.id || s.byId===session.me.id);

        ${promoted?(s.confirmed?'<span class="tag t-ok">轉正・已確認</span>':'<span class="tag t-promo">候補轉正・未確認</span>'):''}
        ${canConfirm?`<button class="mini act" onclick="confirmSignup('${ev.id}','${s.id}')">確認報到</button>`:''}
        ${canCancel?`<button class="mini red" onclick="cancelSignup('${ev.id}','${s.id}','${esc(s.name)}')">取消</button>`:''}
      </div>`;
    };
    const notSigned=membersCache.filter(m=>!list.some(s=>s.memberId===m.id));
    const proxySel=notSigned.length?`
      <div class="row">
        <select id="proxy_${ev.id}">${notSigned.map(m=>`<option value="${m.id}">${esc(m.name)}</option>`).join('')}</select>
        <button class="mini act" onclick="proxySignup('${ev.id}')">代報名</button>
      </div>`:'';
    const myStatus = !mine ? '' :
      (myIdx<cap ? (mine.initialStatus==='wait' && !mine.confirmed ? '<div class="notice">你已從候補轉為正取！請按「確認報到」</div>' : '')
                 : '<div class="notice">你目前在候補名單，若有人取消將依序遞補</div>');
    const expanded=expandedEvs.has(ev.id);
    return `<div class="card">
      <div class="evhead" style="cursor:pointer;" onclick="evToggle('${ev.id}')">
        <span class="evdate">${fmtDate(ev.dateStr)}</span>
        <span class="evtime">${esc(ev.startStr||'')}${ev.endStr?'–'+esc(ev.endStr):''}</span>
        ${ev.venueName?`<span class="evvenue">📍${esc(ev.venueName)}</span>`:''}
        <span class="cnt">正取 ${main.length}/${cap}｜候補 ${wait.length}</span>
        <div class="spacer"></div>
        ${mine
          ? `<button class="cancel" onclick="event.stopPropagation();cancelSignup('${ev.id}','${mine.id}','${esc(session.me.name)}')">取消報名</button>`
          : `<button class="ok" onclick="event.stopPropagation();signupSelf('${ev.id}')">報名</button>`}
        <span class="sub" style="font-size:18px;padding:0 4px;">${expanded?'▴':'▾'}</span>
      </div>
      ${ev.note?`<div class="sub" style="margin-top:6px;">${esc(ev.note)}</div>`:''}
      ${myStatus}
      ${expanded?`
      ${proxySel}
      <div class="divider">正取名單</div>
      ${main.map((s,i)=>row(s,i,false)).join('')||'<div class="sub">尚無人報名</div>'}

    </div>`;
  }).join('');
}
async function addSignup(evId, member){
  const list=signupCache[evId]||[];
  if(list.some(s=>s.memberId===member.id)){ toast('已報名過'); return; }
  const cap=(eventCache[evId]&&eventCache[evId].capacity)||16;
  const initialStatus = list.length>=cap ? 'wait' : 'main';
  await safeWrite(()=>setDoc(doc(signupsCol(evId), member.id), {
    memberId:member.id, name:member.name,
    byId:session.me.id, byName:session.me.name,
    at:serverTimestamp(), initialStatus, confirmed:false
  }), initialStatus==='wait'?`${member.name} 已列入候補`:`${member.name} 報名成功`);
}
window.signupSelf = evId => {
  if(session.me.id==='__admin__'){ toast('總管理者請使用「代報名」'); return; }

};
window.proxySignup = async evId=>{

window.cancelSignup = async (evId, sid, name)=>{
  if(!await askConfirm(`取消「${name}」的報名？`)) return;
  await safeWrite(()=>deleteDoc(doc(signupsCol(evId), sid)), '已取消');
  // 取消的是現場綁定場次 → 同步移除簽到（排隊區/休息區/等待格）
  const bev=(typeof liveEvent==='function')?liveEvent():null;
  if(liveState && bev && bev.id===evId) removeFromLive(sid, name);
};
function removeFromLive(id, name){
  const onCourt=liveState.courts.some(c=>c.match && [...c.match.teamA,...c.match.teamB].includes(id));
  if(onCourt){ toast(`${name} 正在場上比賽，請至「現場」處理`); return; }
  let changed=false;
  const n0=liveState.pool.length;
  liveState.pool=liveState.pool.filter(p=>p.id!==id);
  if(liveState.pool.length!==n0) changed=true;
  const r0=liveState.resting.length;
  liveState.resting=liveState.resting.filter(x=>x!==id);
  if(liveState.resting.length!==r0) changed=true;
  liveState.slots.forEach(s=>s.p.forEach((x,j)=>{ if(x&&x.id===id){ s.p[j]=null; changed=true; } }));
  if(changed){ saveLive(); toast(`${name} 的簽到已一併移除`); }
}
window.confirmSignup = async (evId, sid)=>{

};

const K=32, START_ELO=1500;
let liveState=null, unsubLive=null, liveSel=null, checkinOpen=false, lastHist=[];

const melo  = id => { const m=membersCache.find(x=>x.id===id); return m?(m.elo??START_ELO):START_ELO; };
function fmtWait(ms){ const m=Math.floor(ms/60000); return m<1?'剛到':(m<60?m+' 分':Math.floor(m/60)+' 時 '+(m%60)+' 分'); }
function sameLoc(a,b){ return a&&b&&a.t===b.t&&a.i===b.i&&(a.j??0)===(b.j??0)&&(a.team||'')===(b.team||''); }

function defaultLive(){
  return {courtCount:2, slotCount:2, paused:false, daySeq:0,
    courts:[{label:'1',match:null},{label:'2',match:null},{label:'3',match:null},{label:'4',match:null}],
    slots:[{p:[null,null,null,null],lock:[false,false,false,false]},{p:[null,null,null,null],lock:[false,false,false,false]},{p:[null,null,null,null],lock:[false,false,false,false]},{p:[null,null,null,null],lock:[false,false,false,false]}],
    pool:[], resting:[], lastPairs:[]};
}
function watchLive(){
  if(unsubLive){ unsubLive(); unsubLive=null; }
  liveState=null;
  const ev=liveEvent();
  updateBindSel();
  if(!ev){ if($('liveView') && !$('liveView').classList.contains('hide')) renderLive(); return; }

    }

    }

}
function saveLive(){ if(!boundEventId) return; return safeWrite(()=>setDoc(liveDocRef(boundEventId), liveState)); }

function occupiedIds(){
  const ids=new Set();
  liveState.pool.forEach(p=>ids.add(p.id));
  liveState.resting.forEach(id=>ids.add(id));
  liveState.slots.forEach(s=>s.p.forEach(x=>{ if(x) ids.add(x.id); }));
  liveState.courts.forEach(c=>{ if(c.match) [...c.match.teamA,...c.match.teamB].forEach(id=>{ if(id) ids.add(id); }); });
  return ids;
}
/* ---- 配對演算法：等最久 4 人 → 兩隊積分最接近；同組合避免重複搭檔 ---- */
function pairKeyOf(a,b){ const x=[...a].sort().join('+'), y=[...b].sort().join('+'); return [x,y].sort().join('|'); }
function bestSplit(four){
  const combos=[[[0,1],[2,3]],[[0,2],[1,3]],[[0,3],[1,2]]];
  const cands=combos.map(([a,b])=>{
    const A=[four[a[0]],four[a[1]]], B=[four[b[0]],four[b[1]]];
    const ra=(melo(A[0].id)+melo(A[1].id))/2, rb=(melo(B[0].id)+melo(B[1].id))/2;
    return {A,B,diff:Math.abs(ra-rb),key:pairKeyOf(A.map(x=>x.id),B.map(x=>x.id))};
  }).sort((x,y)=>x.diff-y.diff);
  return cands.find(c=>!(liveState.lastPairs||[]).includes(c.key)) || cands[0];
}
function fillAndAdvance(){
  const st=liveState;
  st.pool.sort((a,b)=>a.since-b.since);
  const fillSlots=()=>{                        // 逐位遞補：取消鎖定的空位不自動補
    for(let i=0;i<st.slotCount;i++){
      const s=st.slots[i];
      for(let j=0;j<4;j++){
        if(s.p[j] || (s.lock&&s.lock[j])) continue;
        if(!st.pool.length) return;
        s.p[j]=st.pool.shift();
      }
    }
  };
  fillSlots();
  if(!st.paused){
    for(let ci=0;ci<st.courtCount;ci++){
      const c=st.courts[ci];
      if(c.match) continue;
      const s0=st.slots[0];
      if(!s0 || s0.p.some(x=>!x)) break;        // 等待一缺人 → 不遞補上場
      const split=bestSplit(s0.p);              // 上場那一刻做平衡分隊
      const sinces={}; s0.p.forEach(x=>{ sinces[x.id]=x.since; });
      c.match={teamA:[split.A[0].id,split.A[1].id], teamB:[split.B[0].id,split.B[1].id], startedAt:null, seq:null, sinces};
      st.slots.shift(); st.slots.push({p:[null,null,null,null],lock:[false,false,false,false]});
      fillSlots();
    }
  }
}

/* ---- 點選互換（管理者）：點 A 再點 B 交換；點空位移入 ---- */
/* ---- 拖曳（管理者）：長按約 0.3 秒或水平快滑拉起；放到另一人=互換、放到空位=移入 ---- */
let ldrag=null, dragDone=false;
function ldragActivate(){
  if(!ldrag || ldrag.active) return;
  ldrag.active=true;
  const g=document.createElement('div');
  g.className='dragghost'; g.textContent=ldrag.name;
  g.style.left=(ldrag.lastX+14)+'px'; g.style.top=(ldrag.lastY-24)+'px';
  document.body.appendChild(g); ldrag.ghost=g;
  document.body.classList.add('dragging');
}
document.addEventListener('pointerdown', e=>{
  if(!isMgr() || !liveState) return;
  const chip=e.target.closest('[data-lt]');
  if(!chip || e.target.closest('button')) return;
  const loc={t:chip.dataset.lt, i:+chip.dataset.li, j:+chip.dataset.lj, team:chip.dataset.lteam||''};
  const v=locGet(loc); if(!v) return;
  ldrag={loc, name:mname(v.id), startX:e.clientX, startY:e.clientY, lastX:e.clientX, lastY:e.clientY,
         active:false, ghost:null, timer:setTimeout(ldragActivate,300)};
});
document.addEventListener('pointermove', e=>{
  if(!ldrag) return;
  ldrag.lastX=e.clientX; ldrag.lastY=e.clientY;
  const dx=e.clientX-ldrag.startX, dy=e.clientY-ldrag.startY;
  if(!ldrag.active){
    if(Math.abs(dx)>12 && Math.abs(dx)>Math.abs(dy)) ldragActivate();
    else if(Math.abs(dy)>14){ clearTimeout(ldrag.timer); ldrag=null; return; }
    else return;
  }
  if(e.cancelable) e.preventDefault();
  ldrag.ghost.style.left=(e.clientX+14)+'px'; ldrag.ghost.style.top=(e.clientY-24)+'px';
  document.querySelectorAll('.dropover').forEach(x=>x.classList.remove('dropover'));
  const t=document.elementFromPoint(e.clientX,e.clientY);
  const tgt=t && t.closest('[data-lt]');
  if(tgt) tgt.classList.add('dropover');
});
document.addEventListener('touchmove', e=>{ if(ldrag&&ldrag.active&&e.cancelable) e.preventDefault(); }, {passive:false});
document.addEventListener('pointerup', e=>{
  if(!ldrag) return;
  clearTimeout(ldrag.timer);
  if(ldrag.active){
    const t=document.elementFromPoint(e.clientX,e.clientY);
    const tgt=t && t.closest('[data-lt]');
    if(tgt){
      const loc={t:tgt.dataset.lt, i:+tgt.dataset.li, j:+tgt.dataset.lj, team:tgt.dataset.lteam||''};
      if(!sameLoc(ldrag.loc,loc)) doSwap(ldrag.loc, loc);
    }
    if(ldrag.ghost) ldrag.ghost.remove();
    document.body.classList.remove('dragging');
    dragDone=true; setTimeout(()=>dragDone=false,350);
    liveSel=null; renderLive();
  }
  ldrag=null;
});

window.liveTap = (t,i,j,team)=>{

    liveSel=loc; renderLive(); return;
  }
  if(sameLoc(liveSel,loc)){ liveSel=null; renderLive(); return; }

};
function locGet(l){
  if(l.t==='pool') return liveState.pool[l.i]||null;
  if(l.t==='slot') return liveState.slots[l.i].p[l.j];
  if(l.t==='court'){ const m=liveState.courts[l.i].match; if(!m) return null;
    const id=(l.team==='A'?m.teamA:m.teamB)[l.j];
    if(!id) return null;
    return {id, since:(m.sinces&&m.sinces[id])||Date.now()}; }
  return null;
}
function locSet(l,v){
  if(l.t==='pool'){
    const nv=v?{id:v.id, since:Date.now()}:null;   // 進排隊區重新計時
    if(l.i<liveState.pool.length){ if(nv) liveState.pool[l.i]=nv; else liveState.pool.splice(l.i,1); }
    else if(nv) liveState.pool.push(nv);
  }else if(l.t==='slot'){
    liveState.slots[l.i].p[l.j]=v;
    liveState.slots[l.i].lock[l.j]=false;   // 拖曳造成的空位＝開放，由排隊區自動遞補；僅取消（✕）鎖定
  }
  else if(l.t==='court'){ const m=liveState.courts[l.i].match;
    (l.team==='A'?m.teamA:m.teamB)[l.j]=v?v.id:null;
    if(v){ if(!m.sinces) m.sinces={}; m.sinces[v.id]=v.since; } }
}
function doSwap(a,b){
  const va=locGet(a), vb=locGet(b);
  const courtStarted=l=>l.t==='court' && liveState.courts[l.i].match && liveState.courts[l.i].match.startedAt;
  if((courtStarted(a)&&!vb)||(courtStarted(b)&&!va)){ toast('比賽進行中的位置不能留空'); return; }
  if(!va&&!vb) return;
  locSet(b,va); locSet(a,vb);
  liveState.pool.sort((x,y)=>x.since-y.since);
  fillAndAdvance();          // 調整後立即檢查：開放空位自動補、滿員且有空場即上場
  saveLive();
}

  }));

  [...m.teamA,...m.teamB].forEach(id=>liveState.pool.push({id,since:Date.now()}));

async function applyEloCloud(teamA,teamB,sa,sb){
  await refreshMembers();
  const ra=(melo(teamA[0])+melo(teamA[1]))/2, rb=(melo(teamB[0])+melo(teamB[1]))/2;
  const ea=1/(1+Math.pow(10,(rb-ra)/400));
  const mov=1+Math.abs(sa-sb)/Math.max(sa,sb);
  const aW=sa>sb;
  const delta=Math.max(1,Math.round(K*mov*Math.abs((aW?1:0)-ea)));
  const ok=await safeWrite(async ()=>{
    for(const id of teamA){ const m=membersCache.find(x=>x.id===id); if(!m) continue;
      await updateDoc(doc(membersCol(),id), {elo:(m.elo??START_ELO)+(aW?delta:-delta),
        wins:(m.wins||0)+(aW?1:0), losses:(m.losses||0)+(aW?0:1), matches:(m.matches||0)+1}); }
    for(const id of teamB){ const m=membersCache.find(x=>x.id===id); if(!m) continue;
      await updateDoc(doc(membersCol(),id), {elo:(m.elo??START_ELO)+(aW?-delta:delta),
        wins:(m.wins||0)+(aW?0:1), losses:(m.losses||0)+(aW?1:0), matches:(m.matches||0)+1}); }
  });
  if(!ok) return null;
  await refreshMembers();
  return delta;
}

    const snap=await getDocs(query(matchesCol(), orderBy('t','desc')));
    lastHist=snap.docs.map(d=>({id:d.id,...d.data()}));
  }catch(e){ console.error(e); }
  const list=[...membersCache].sort((a,b)=>(b.elo??START_ELO)-(a.elo??START_ELO));
  const t0=new Date(); t0.setHours(0,0,0,0);
  const today=lastHist.filter(h=>h.t>=t0.getTime());
  const mgr=isMgr();
  box.innerHTML=`
  <div class="card"><h2>📊 積分排行</h2>
    <table style="width:100%;border-collapse:collapse;font-size:15px;">
      <tr style="color:var(--sub);font-size:13px;"><td>名次</td><td>姓名</td><td style="text-align:center;">積分</td><td style="text-align:center;">勝</td><td style="text-align:center;">敗</td><td style="text-align:center;">勝率</td></tr>
      ${list.map((m,i)=>`<tr style="border-top:1px solid var(--line);">
        <td style="padding:8px 4px;">${i+1}</td><td>${esc(m.name)}</td>
        <td style="text-align:center;"><b>${m.elo??START_ELO}</b></td>
        <td style="text-align:center;">${m.wins||0}</td><td style="text-align:center;">${m.losses||0}</td>
        <td style="text-align:center;">${m.matches?Math.round((m.wins||0)/m.matches*100)+'%':'—'}</td></tr>`).join('')}
    </table>
  </div>
  <div class="card"><h2>今日對戰紀錄（${today.length} 場）</h2>
    ${today.map(h=>`<div class="item">
      <span class="nm"><b>場地${esc(h.court)}</b>｜${esc(h.a)} <b style="color:var(--teal);">${h.sa}:${h.sb}</b> ${esc(h.b)} <span class="sub">±${String(h.delta).replace(/[+\-]/,'')}</span></span>
      ${mgr?`<button class="mini" onclick="editMatch('${h.id}')">✎ 修改</button><button class="mini red" onclick="delMatch('${h.id}')">刪除</button>`:''}
    </div>`).join('')||'<div class="sub">今日尚無紀錄</div>'}
  </div>
  <div class="card"><h2>ℹ️ 積分怎麼算（Elo 制）</h2>
    <div style="font-size:15px;line-height:1.8;">
      <p>1. 每人初始 <b>1500</b> 分，隊伍實力＝兩人積分的平均。</p>
      <p>2. 每場結束依「賽前的預期勝率」加減分：<b>爆冷贏強隊加很多、贏弱隊只加一點</b>；輸球反向扣分，勝負雙方加減的分數相同。</p>
      <p>3. <b>分差加成</b>：險勝（21:19）加成低、大勝（21:5）加成高，最高約 2 倍。</p>
      <p>4. 公式：變動分 = 32 ×（1＋分差÷勝方得分）×（實際結果－預期勝率）；預期勝率 = 1／(1＋10^((對方隊均分－我方隊均分)÷400))。</p>
      <p class="sub">實例：同實力對戰 21:19 → 贏家每人 +18；21:5 → +28；弱隊（隊均 1400）爆冷贏強隊（隊均 1650）21:15 → +33；反之強隊險勝弱隊只 +8。</p>
      <p class="sub">任何一場紀錄被修改或刪除後，系統會依全部紀錄從頭重新計算所有人的積分，確保公平。</p>
    </div>
  </div>`;
}
window.editMatch = async id=>{
  if(!isMgr()) return;
  const h=lastHist.find(x=>x.id===id); if(!h) return;
  const v=await askInput(`修改比分（目前 ${h.sa}:${h.sb}，格式如 21:15）`,'text');
  if(!v) return;
  const mch=v.trim().match(/^(\d{1,2})[:：](\d{1,2})$/);
  if(!mch){ toast('格式錯誤，請輸入如 21:15'); return; }
  const sa=+mch[1], sb=+mch[2];
  if(sa===sb){ toast('比分不能相同'); return; }
  await safeWrite(()=>updateDoc(doc(matchesCol(),id),{sa,sb}));
  await recalcAll(); renderRank();
};
window.delMatch = async id=>{
  if(!isMgr()) return;
  if(!await askConfirm('刪除此場次紀錄？所有人積分將重新計算')) return;
  await safeWrite(()=>deleteDoc(doc(matchesCol(),id)));
  await recalcAll(); renderRank();
};
async function recalcAll(){
  toast('積分重新計算中…');
  const snap=await getDocs(query(matchesCol(), orderBy('t')));
  await refreshMembers();
  const map={}; membersCache.forEach(m=>map[m.id]={elo:START_ELO,w:0,l:0,n:0});
  const deltaFix=[];
  for(const d of snap.docs){
    const h=d.data();
    if([...h.teamA,...h.teamB].some(id=>!map[id])) continue;   // 成員已刪除 → 跳過
    const ra=(map[h.teamA[0]].elo+map[h.teamA[1]].elo)/2, rb=(map[h.teamB[0]].elo+map[h.teamB[1]].elo)/2;
    const ea=1/(1+Math.pow(10,(rb-ra)/400));
    const mov=1+Math.abs(h.sa-h.sb)/Math.max(h.sa,h.sb);
    const aW=h.sa>h.sb;
    const delta=Math.max(1,Math.round(K*mov*Math.abs((aW?1:0)-ea)));
    h.teamA.forEach(id=>{ map[id].elo+=aW?delta:-delta; aW?map[id].w++:map[id].l++; map[id].n++; });
    h.teamB.forEach(id=>{ map[id].elo+=aW?-delta:delta; aW?map[id].l++:map[id].w++; map[id].n++; });
    const nd=(aW?'+':'-')+delta;
    if(nd!==h.delta) deltaFix.push({ref:d.ref, delta:nd});
  }
  await safeWrite(async ()=>{
    for(const m of membersCache){
      const v=map[m.id];
      await updateDoc(doc(membersCol(),m.id),{elo:v.elo,wins:v.w,losses:v.l,matches:v.n});
    }
    for(const f of deltaFix) await updateDoc(f.ref,{delta:f.delta});
  },'積分已重新計算完成');
  await refreshMembers();
}

</script>
